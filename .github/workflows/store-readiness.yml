name: Store Readiness

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  flutter-store-readiness:
    name: Flutter store readiness gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Store readiness static gate
        shell: pwsh
        run: ./tools/verify_store_readiness.ps1 -SkipFlutter -SkipBundleCheck

      - name: Build debug APK smoke test
        run: flutter build apk --debug
